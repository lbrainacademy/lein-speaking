# Configuración de despliegue para Render (https://render.com)
# Render lee este archivo y crea el servicio de Lein automáticamente.
services:
  - type: web
    name: lein-speaking
    runtime: node
    plan: free
        rootDir: lein-deploy/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Estas dos las pegas tú en el panel de Render (no van en el código):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # El resto ya queda configurado:
      - key: MODEL
        value: claude-sonnet-4-6
      - key: TTS_MODEL
        value: gpt-4o-mini-tts
      - key: TTS_VOICE
        value: shimmer
      - key: DAILY_LIMIT_MINUTES
        value: "10"
      - key: DAILY_RESET_TZ
        value: America/Chicago
      - key: ALLOWED_ORIGINS
        value: "*"
